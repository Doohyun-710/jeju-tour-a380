<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>성산일출봉 A380 투어링</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; position: fixed; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #top-center { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
        #timer-display { background: rgba(0,0,0,0.8); color: #00ff00; padding: 5px 20px; border-radius: 10px; font-family: monospace; font-size: 24px; border: 2px solid #00ff00; margin-bottom: 8px; }
        #nav-arrow-bg { width: 55px; height: 55px; background: rgba(0,0,0,0.6); border-radius: 50%; border: 2px solid #00d4ff; display: flex; justify-content: center; align-items: center; }
        #dist-info { background: rgba(0,180,255,0.9); color: white; padding: 4px 15px; border-radius: 15px; font-weight: bold; margin-top: 5px; font-size: 14px; }
        #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; pointer-events: auto; }
        .retry-btn { padding: 20px 60px; background: #1e90ff; color: white; border: none; border-radius: 50px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 0 20px rgba(30,144,255,0.5); }
        #status-panel { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 10px; font-size: 14px; }
        .mobile-ctrl { position: absolute; bottom: 40px; pointer-events: auto; display: block; } /* 테스트를 위해 block으로 변경 */
        #l-pad { left: 20px; width: 160px; height: 160px; }
        #r-pad { right: 30px; }
        .btn-circle { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; position: absolute; display: flex; justify-content: center; align-items: center; color: white; user-select: none; }
        #m-up { top: 0; left: 52px; } #m-down { bottom: 0; left: 52px; }
        #m-left { top: 52px; left: 0; } #m-right { top: 52px; right: 0; }
        .btn-boost { width: 90px; height: 90px; background: #ff4500; border: 4px solid #fff; border-radius: 50%; color: white; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        #overlay { position: absolute; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; color:white; }
        #start-btn { padding: 20px 60px; background: #1e90ff; color: white; border: none; border-radius: 50px; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>성산일출봉 A380 투어링</h1>
        <p id="loading-txt">최적화 로딩 중...</p>
        <button id="start-btn" style="display:none">비행 시작</button>
    </div>

    <div id="result-screen">
        <h1 style="font-size: 50px; color: #ffeb3b; margin: 0;">MISSION COMPLETE!</h1>
        <p style="font-size: 24px; color: #fff; margin: 10px 0;">최종 기록: <span id="final-time" style="color:#00ff00">0</span>s</p>
        <button class="retry-btn" onclick="location.reload()">다시 비행하기</button>
    </div>

    <div id="ui-layer">
        <div id="top-center">
            <div id="timer-display">0</div>
            <div id="nav-arrow-bg">
                <svg id="arrow-svg" width="35" height="35" viewBox="0 0 40 40">
                    <polygon points="20,5 35,35 20,25 5,35" fill="#00d4ff" />
                </svg>
            </div>
            <div id="dist-info"><span id="m-val">0</span>m</div>
        </div>
        <div id="status-panel">
            <b id="cp-num" style="color:#ffeb3b; font-size: 18px;">CP 1/3</b><br>
        </div>
    </div>

    <div id="l-pad" class="mobile-ctrl">
        <div id="m-up" class="btn-circle">▲</div><div id="m-down" class="btn-circle">▼</div>
        <div id="m-left" class="btn-circle">◀</div><div id="m-right" class="btn-circle">▶</div>
    </div>
    <div id="r-pad" class="mobile-ctrl">
        <div id="m-boost" class="btn-boost">THRUST</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const renderer = new THREE.WebGLRenderer({ 
            antialias: false, 
            powerPreference: "high-performance",
            precision: "mediump"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 30000);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(500, 2000, 500);
        scene.add(sun);

        const game = {
            started: false, startTime: 0, lastSec: -1,
            plane: new THREE.Group(),
            vel: 0, turnVel: 0, pitchVel: 0,
            keys: { w:false, a:false, s:false, d:false, space:false },
            particles: [],
            mountainPos: new THREE.Vector3(0, -300, -4500),
            cpPos: [], cpRings: [], currentCP: 0,
            boundary: 8000,
            hitCool: 0 // 수정됨: 객체 내부에 올바르게 정의
        };

        const _v1 = new THREE.Vector3();
        const _v2 = new THREE.Vector3();
        const _v3 = new THREE.Vector3();
        const _rayDir = new THREE.Vector3();

        function getRandomPos() {
            return new THREE.Vector3(
                (Math.random() - 0.5) * 6000,
                1200 + Math.random() * 800,
                -(Math.random() * 7000 + 1000)
            );
        }

        for (let i = 0; i < 3; i++) { game.cpPos.push(getRandomPos()); }
        scene.add(game.plane);

        const loader = new GLTFLoader();
        
        // 지형 로드 (실패 시에도 게임 진행 가능하게 처리)
        loader.load('seongsan.glb', 
            (gltf) => {
                const m = gltf.scene;
                m.position.copy(game.mountainPos);
                m.scale.set(135, 135, 135);
                scene.add(m);
                readyToStart();
            },
            undefined,
            (err) => {
                console.warn("지형 파일 없음 - 임시 바닥 생성");
                const ground = new THREE.Mesh(new THREE.BoxGeometry(10000, 10, 10000), new THREE.MeshBasicMaterial({color: 0x33aa33}));
                ground.position.y = -500;
                scene.add(ground);
                readyToStart();
            }
        );

        function readyToStart() {
            document.getElementById('loading-txt').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
        }

        const ringGeo = new THREE.TorusGeometry(350, 25, 8, 24);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
        game.cpPos.forEach(pos => {
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(pos);
            ring.visible = false;
            scene.add(ring);
            game.cpRings.push(ring);
        });

        function explode(pos) {
            const pGeo = new THREE.BoxGeometry(20, 20, 20);
            const pMat = new THREE.MeshBasicMaterial({color: 0xff4400});
            for (let i = 0; i < 8; i++) {
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.copy(pos);
                p.userData.v = new THREE.Vector3((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
                p.userData.life = 1.0;
                scene.add(p);
                game.particles.push(p);
            }
        }

        const raycaster = new THREE.Raycaster();
        function checkHits() {
            const now = Date.now();
            if (now < game.hitCool) return;

            _rayDir.set(0,0,-1).applyQuaternion(game.plane.quaternion);
            raycaster.set(game.plane.position, _rayDir);
            const hits = raycaster.intersectObjects(scene.children, true);
            
            const distToMountain = game.plane.position.distanceTo(game.mountainPos);
            const isMHit = hits.length > 0 && hits.find(h => h.object.type !== 'TorusGeometry' && h.distance < 150);

            if (isMHit || distToMountain > game.boundary) {
                explode(game.plane.position);
                game.hitCool = now + 1500;
                const back = _v1.set(0,0,1).applyQuaternion(game.plane.quaternion);
                game.plane.position.addScaledVector(back, 300);
                game.vel = -2;
            }
        }

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            
            loader.load('korean_air.glb', 
                (gltf) => {
                    const m = gltf.scene; m.scale.set(5, 5, 5); m.rotation.y = Math.PI;
                    game.plane.add(m);
                },
                undefined,
                (err) => {
                    console.warn("비행기 파일 없음 - 임시 비행체 생성");
                    const body = new THREE.Mesh(new THREE.BoxGeometry(50, 20, 100), new THREE.MeshBasicMaterial({color: 0xffffff}));
                    game.plane.add(body);
                }
            );
            
            game.plane.position.set(0, 1600, 1000);
            game.started = true;
            game.startTime = Date.now();
        };

        window.onkeydown = (e) => {
            const k = e.key.toLowerCase();
            if(k==='w') game.keys.w = true; if(k==='s') game.keys.s = true;
            if(k==='a') game.keys.a = true; if(k==='d') game.keys.d = true;
            if(e.code==='Space') game.keys.space = true;
        };
        window.onkeyup = (e) => {
            const k = e.key.toLowerCase();
            if(k==='w') game.keys.w = false; if(k==='s') game.keys.s = false;
            if(k==='a') game.keys.a = false; if(k==='d') game.keys.d = false;
            if(e.code==='Space') game.keys.space = false;
        };

        const mBind = (id, k) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); game.keys[k] = true; }, {passive: false});
            el.addEventListener('touchend', (e) => { e.preventDefault(); game.keys[k] = false; }, {passive: false});
        };
        mBind('m-up', 'w'); mBind('m-down', 's'); mBind('m-left', 'a'); mBind('m-right', 'd');
        mBind('m-boost', 'space');

        let frameCount = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (!game.started) return;

            frameCount++;
            const now = Date.now();
            const currentSec = Math.floor((now - game.startTime) / 1000);
            
            if (game.lastSec !== currentSec) {
                document.getElementById('timer-display').textContent = currentSec;
                game.lastSec = currentSec;
            }

            game.vel = THREE.MathUtils.lerp(game.vel, game.keys.space ? 15 : 7, 0.05);
            
            let tTurn = 0;
            if (game.keys.a) tTurn = 0.035; else if (game.keys.d) tTurn = -0.035;
            game.turnVel = THREE.MathUtils.lerp(game.turnVel, tTurn, 0.1);
            game.plane.rotation.y += game.turnVel;
            game.plane.rotation.z = THREE.MathUtils.lerp(game.plane.rotation.z, game.turnVel * 30, 0.1);

            let tPitch = 0;
            if (game.keys.w) tPitch = -0.4; else if (game.keys.s) tPitch = 0.4;
            game.pitchVel = THREE.MathUtils.lerp(game.pitchVel, tPitch, 0.1);
            game.plane.rotation.x = game.pitchVel;

            game.plane.translateZ(-game.vel * 4);
            
            // 5프레임마다 충돌 체크 (성능 확보)
            if (frameCount % 5 === 0) checkHits();

            const target = game.cpPos[game.currentCP];
            const d = game.plane.position.distanceTo(target);
            
            game.cpRings.forEach((r, i) => r.visible = (i === game.currentCP));

            if (d < 500) {
                game.currentCP++;
                if (game.currentCP >= 3) {
                    game.started = false;
                    document.getElementById('final-time').textContent = currentSec;
                    document.getElementById('result-screen').style.display = 'flex';
                }
            }

            _v1.subVectors(target, game.plane.position).normalize();
            _v2.set(0,0,-1).applyQuaternion(game.plane.quaternion);
            const ang = Math.atan2(_v1.x, _v1.z) - Math.atan2(_v2.x, _v2.z);
            document.getElementById('arrow-svg').style.transform = `rotate(${ang * 57.3}deg)`;
            document.getElementById('m-val').textContent = Math.round(d);
            document.getElementById('cp-num').textContent = `CP ${game.currentCP+1}/3`;

            for (let i = game.particles.length-1; i>=0; i--) {
                const p = game.particles[i];
                p.position.add(p.userData.v);
                p.userData.v.y -= 0.5;
                p.userData.life -= 0.02;
                p.scale.setScalar(p.userData.life);
                if (p.userData.life <= 0) { scene.remove(p); game.particles.splice(i, 1); }
            }

            _v3.set(0, 60, 350).applyQuaternion(game.plane.quaternion).add(game.plane.position);
            camera.position.lerp(_v3, 0.1);
            camera.lookAt(game.plane.position);
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
